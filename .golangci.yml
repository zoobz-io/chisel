version: "2"

run:
  timeout: 5m
  tests: true

linters:
  enable:
    # Required (minimum)
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused

    # Security
    - gosec
    - noctx
    - bodyclose
    - sqlclosecheck

    # Error handling
    - errorlint
    - errchkjson
    - wastedassign

    # Best practices
    - gocritic
    - revive
    - unconvert
    - dupl
    - goconst
    - misspell
    - prealloc
    - copyloopvar

  settings:
    errcheck:
      check-type-assertions: true
      check-blank: true

    govet:
      enable-all: true
      disable:
        - fieldalignment

    dupl:
      threshold: 150

    goconst:
      min-len: 3
      min-occurrences: 3

  exclusions:
    rules:
      - path: _test\.go
        linters:
          - dupl
          - goconst
          - govet
